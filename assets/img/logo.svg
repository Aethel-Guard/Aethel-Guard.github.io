<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="shieldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1520"/>
      <stop offset="100%" stop-color="#080B12"/>
    </linearGradient>
    <linearGradient id="emberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5BE50"/>
      <stop offset="100%" stop-color="#D9AB52"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shield -->
  <path d="M256 40 L80 140 L80 280 C80 400 160 460 256 480 C352 460 432 400 432 280 L432 140 Z" fill="url(#shieldFill)" stroke="#D9AB52" stroke-width="3"/>
  
  <!-- Sentinel mark: upward strokes -->
  <line x1="256" y1="140" x2="256" y2="300" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="170" y1="220" x2="256" y2="160" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="342" y1="220" x2="256" y2="160" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Crossbar -->
  <line x1="170" y1="260" x2="342" y2="260" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Ember dot -->
  <circle cx="256" cy="330" r="16" fill="url(#emberGrad)" filter="url(#glow)"/>
  <circle cx="256" cy="330" r="8" fill="#F5BE50"/>
</svg>